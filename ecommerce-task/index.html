<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Jacket</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrapper">

  <!-- NAV -->
  <header class="nav">
    <div class="logo">ASTRO<span>.</span></div>

    <nav>
      <a>PRODUCTS</a>
      <a>CATEGORY</a>
      <a>ABOUT US</a>
      <a>CONTACT</a>
    </nav>

    <div class="icons">
      <span>🔍</span>
      <span>🛒</span>
      <span>👤</span>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div class="left">
      <span class="tag">NEW</span>
      <h1>
        ASTRO <br>
        WINTER <br>
        ARMOR <span>II</span>
      </h1>

      <h2>$560</h2>

      <div class="desc">
        <h4>DESCRIPTION</h4>
        <p>
          A next-gen cold war jacket. The essence of retro style and the
          resilience you need for extreme winter conditions.
        </p>
        <a>READ MORE →</a>
      </div>

      <div class="accordion">MATERIAL & CARE</div>
      <div class="accordion">SHIPPING & RETURNS</div>

    </div>

    <!-- CENTER -->
    <div class="center">
      <img src="images/ChatGPT Image May 9, 2026, 09_37_27 PM.png" alt="jacket">
    </div>

    <!-- RIGHT -->
    <div class="right">

      <div class="size">
        <h4>SIZE</h4>
        <div class="sizes">
          <span>S</span>
          <span class="active">M</span>
          <span>L</span>
          <span>XL</span>
        </div>
      </div>

      <div class="colors">
        <h4>COLOR</h4>
        <div class="color-grid">
          <div class="color active"></div>
          <div class="color red"></div>
          <div class="color black"></div>
          <div class="color white"></div>
        </div>
      </div>

      <button class="wishlist">♡ ADD TO WISHLIST</button>
      <button class="cta">ADD TO BAG</button>

    </div>

  </div>

</div>

</body>
</html>

<html lang="en">

  <title>Pikachu Layout</title>

  <link rel="stylesheet" href="style.css">

  <div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

      <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pokémon_logo.svg"
        alt="Pokemon Logo"
      >

      <div class="content">

        <div class="mini-title">
          POKEMON GEN I
        </div>

        <h1 class="title">
          Pikachu
        </h1>

        <p class="desc">
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by
          yellow fur.
        </p>

      </div>

      <div class="count">
        <div class="line"></div>
        <span>01 / 08</span>
      </div>

      <div class="pokeball"></div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

      <div class="menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="dots">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

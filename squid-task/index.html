<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squid Game UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="logo">SQUID GAME</div>

      <ul class="nav-links">
        <li>About</li>
        <li class="active">Watch now</li>
        <li>Actors</li>
        <li>Contact</li>
      </ul>

      <div class="menu">≡</div>
    </nav>

    <!-- HERO -->
    <section class="hero">

      <div class="left">
        <h1>
          SQUID<br>
          <span>GAME</span>
        </h1>

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">
          <button class="play">▶ Play Now</button>
          <button class="outline">Watch Trailer</button>
        </div>
      </div>

      <div class="right">
        <img src="images/ChatGPT Image May 9, 2026, 09_18_57 PM.png" alt="guard">
      </div>

      <div class="scroll">SCROLL</div>

    </section>

    <!-- THUMBNAILS -->
    <div class="thumbnails">

      <div class="thumb">
        <img src="https://picsum.photos/300?11">
      </div>

      <div class="thumb">
        <img src="https://picsum.photos/300?12">
      </div>

      <div class="thumb">
        <img src="https://picsum.photos/300?13">
      </div>

    </div>

  </div>

</body>
</html>
